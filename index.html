<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-blue-100 to-blue-300 min-h-screen p-8 font-sans">
    <div class="container mx-auto">
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8 drop-shadow-lg">Kanban Board</h1>

        <div class="mb-8 flex justify-center">
            <button id="addTaskBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform transition duration-300 hover:scale-105 glass-effect">
                Add New Task
            </button>
        </div>

        <div id="kanban-board" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Todo Column -->
            <div class="kanban-column" id="todo-column">
                <h2 class="text-2xl font-semibold text-gray-700 mb-4 pb-2 border-b-2 border-blue-400">Todo</h2>
                <div class="task-list" id="todo-list"></div>
            </div>

            <!-- In Progress Column -->
            <div class="kanban-column" id="in-progress-column">
                <h2 class="text-2xl font-semibold text-gray-700 mb-4 pb-2 border-b-2 border-blue-400">In Progress</h2>
                <div class="task-list" id="in-progress-list"></div>
            </div>

            <!-- Done Column -->
            <div class="kanban-column" id="done-column">
                <h2 class="text-2xl font-semibold text-gray-700 mb-4 pb-2 border-b-2 border-blue-400">Done</h2>
                <div class="task-list" id="done-list"></div>
            </div>
        </div>
    </div>

    <!-- Task Modal (Add/Edit) -->
    <div id="taskModal" class="modal hidden fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center p-4">
        <div class="modal-content bg-white rounded-xl shadow-2xl p-6 w-full max-w-md glass-effect-light">
            <h3 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-4">Add New Task</h3>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="mb-4">
                    <label for="taskTitle" class="block text-gray-700 text-sm font-bold mb-2">Title</label>
                    <input type="text" id="taskTitle" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline glass-input" required>
                </div>
                <div class="mb-4">
                    <label for="taskDescription" class="block text-gray-700 text-sm font-bold mb-2">Description</label>
                    <textarea id="taskDescription" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline glass-input"></textarea>
                </div>
                <div class="mb-4">
                    <label for="taskPriority" class="block text-gray-700 text-sm font-bold mb-2">Priority</label>
                    <select id="taskPriority" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline glass-input">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                        <option value="Top Priority">Top Priority</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label for="taskAssignee" class="block text-gray-700 text-sm font-bold mb-2">Assignee</label>
                    <select id="taskAssignee" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline glass-input">
                        <option value="Sankeerth">Sankeerth</option>
                        <option value="Japer">Japer</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline glass-effect">
                        Save Task
                    </button>
                    <button type="button" id="closeTaskModal" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline glass-effect">
                        Cancel
                    </button>
                    <button type="button" id="deleteTaskBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline glass-effect hidden">
                        Delete
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- History Log Modal -->
    <div id="historyModal" class="modal hidden fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center p-4">
        <div class="modal-content bg-white rounded-xl shadow-2xl p-6 w-full max-w-md glass-effect-light">
            <h3 class="text-2xl font-bold text-gray-800 mb-4">Task History</h3>
            <div id="historyLog" class="mb-4 h-64 overflow-y-auto border border-gray-200 p-3 rounded-lg bg-gray-50">
                <!-- History items will be inserted here -->
            </div>
            <div class="flex justify-end">
                <button type="button" id="closeHistoryModal" class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline glass-effect">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
